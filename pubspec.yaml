name: john_estacio_website
description: The official website for composer John Estacio.
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  intl: 0.20.2
  timezone: ^0.10.1
  pdfrx: ^2.1.5
  web: ^1.0.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase Core
  cloud_firestore: ^5.6.9
  cloud_functions: ^5.5.2
  firebase_auth: ^5.6.0
  firebase_core: ^3.14.0
  firebase_storage: ^12.4.7

  # Routing
  go_router: ^12.1.3

  # UI & State Management
  auto_size_text: ^3.0.0 
  flutter_animate: ^4.5.0
  google_fonts: ^6.1.0
  provider: ^6.1.5
  shimmer: ^3.0.0

  # Rich Text Editor
  flutter_quill: ^11.4.2 
  flutter_quill_extensions: ^11.0.0 

  # Media & Embeds
  flutter_html: ^3.0.0
  just_audio: ^0.9.43
  url_launcher: ^6.3.1
  webview_flutter: ^4.13.0
  webview_flutter_web: ^0.2.2

  # Utilities
  cupertino_icons: ^1.0.0
  equatable: ^2.0.7
  flutter_dropzone: ^4.2.1
  file_picker: ^8.0.0+1
  http: ^1.2.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/images/

  fonts:
    - family: 'Nunito Sans'
      fonts:
        - asset: assets/fonts/NunitoSans-Regular.ttf
        - asset: assets/fonts/NunitoSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/NunitoSans-Italic.ttf
          style: italic
        - asset: assets/fonts/NunitoSans-BoldItalic.ttf
          weight: 700
          style: italic
          
    - family: 'Manrope'
      fonts:
        - asset: assets/fonts/Manrope-Regular.ttf
        - asset: assets/fonts/Manrope-Bold.ttf
          weight: 700
name: Deploy to Firebase Hosting on Merge
on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Flutter matching your Dreamflow environment
      - name: Setup Flutter (Dreamflow version)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.38.5'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Fixed the flag from --web-renderer to --renderer
      - name: Build Web (CanvasKit)
        run: flutter build web --release --renderer canvaskit

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_MOONLITELY_ENTERTAINMEN_XT654Z }}'
          channelId: live
          projectId: moonlitely-entertainmen-xt654z
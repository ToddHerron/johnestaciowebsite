name: Deploy to Firebase Hosting on Merge
on:
  push:
    branches:
      - main # Change this to your default branch name

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout the code
      - uses: actions/checkout@v4

      # 2. Setup the Flutter environment
      - name: Setup flutter (dreamflow flutter version 3.38.5)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # Specify the version to match Dreamflow environment
          flutter-version: '3.38.5' # As of March 24, 2026
          cache: true

      # 3. Install dependencies and Build
      - name: Install dependencies and build web version
        run: |
          flutter pub get
          flutter build web --release --web-renderer canvaskit

      # 4. Deploy to Firebase Hosting
      - name: Deploy to firebase hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_MOONLITELY_ENTERTAINMEN_XT65 }}' # Check your GitHub Secrets for the exact name
          channelId: live
          projectId: moonlitely-entertainmen-xt654z

